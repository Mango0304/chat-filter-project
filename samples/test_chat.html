<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>聊天记录</title>
</head>
<body>
    <div class="chat-item">
        <span class="time">2024-01-01 10:00:00</span>
        <span class="sender">张三</span>
        <p class="content">李四，今天方便吗？我想跟你借点钱</p>
    </div>
    <div class="chat-item">
        <span class="time">2024-01-01 10:05:00</span>
        <span class="sender">李四</span>
        <p class="content">什么问题？</p>
    </div>
    <div class="chat-item">
        <span class="time">2024-01-01 10:10:00</span>
        <span class="sender">张三</span>
        <p class="content">就是上次说的那个借款的事情，需要5000元</p>
    </div>
    <div class="chat-item">
        <span class="time">2024-01-01 10:15:00</span>
        <span class="sender">李四</span>
        <p class="content">好的，我转账给你</p>
    </div>
    <div class="chat-item">
        <span class="time">2024-01-01 10:20:00</span>
        <span class="sender">张三</span>
        <p class="content">谢谢！收到了吗？</p>
    </div>
    <div class="chat-item">
        <span class="time">2024-01-01 10:25:00</span>
        <span class="sender">李四</span>
        <p class="content">已经转了，你查收一下</p>
    </div>
    <div class="chat-item">
        <span class="time">2024-01-01 10:30:00</span>
        <span class="sender">王五</span>
        <p class="content">晚上一起吃饭吧？</p>
    </div>
    <div class="chat-item">
        <span class="time">2024-01-01 10:35:00</span>
        <span class="sender">张三</span>
        <p class="content">好的，收到转账了，谢谢李四！</p>
    </div>
</body>
</html>
