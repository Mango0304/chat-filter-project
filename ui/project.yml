name: ChatFilter
options:
  bundleIdPrefix: com.chatfilter
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGNING_ALLOWED: NO

targets:
  ChatFilter:
    type: application
    platform: macOS
    sources:
      - path: .
        excludes:
          - "*.xcodeproj"
          - "*.xcworkspace"
          - "project.yml"
          - "dist"
          - "build"
    postCompileScripts:
      - name: Copy Bundled Python
        script: |
          # 复制打包好的Python可执行文件到app bundle
          BUNDLED_PYTHON_DIR="${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Contents/MacOS/ChatFilterBinary"
          SOURCE_DIR="${SRCROOT}/../dist/ChatFilterBinary"

          # 创建目标目录
          mkdir -p "${BUNDLED_PYTHON_DIR}"

          # 复制整个目录
          cp -R "${SOURCE_DIR}/" "${BUNDLED_PYTHON_DIR}/"

          echo "Copied Python binary to: ${BUNDLED_PYTHON_DIR}"
        runOnlyWhenInstalling: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.chatfilter.app
        INFOPLIST_FILE: Info.plist
        PRODUCT_NAME: ChatFilter
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
        ENABLE_HARDENED_RUNTIME: NO
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO
    entitlements:
      path: ChatFilter.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.files.user-selected.read-write: true
